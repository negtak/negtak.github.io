<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サポート - Aquamulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0066aa 0%, #00b4dc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .support-text {
            color: #666;
            font-size: 1.2em;
            line-height: 1.8;
            margin: 30px 0;
        }
        .email-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #0066aa 0%, #00b4dc 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .email-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 102, 170, 0.4);
        }
        .email-address {
            color: #0066aa;
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>サポート</h1>
        <div class="support-text">
            <p>ご不明な点やご質問がございましたら、<br>
            以下のメールアドレスまでお問い合わせください。</p>
            <p class="email-address">negdev0114@gmail.com</p>
            <p>にお問い合わせお願いします。</p>
        </div>
        <a href="mailto:negdev0114@gmail.com" class="email-link">メールを送信する</a>
    </div>
</body>
</html>
