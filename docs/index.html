  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1923;
      color: #f0f0f0;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      text-align: center;
      padding: 72px 24px 48px;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    header p {
      font-size: 1rem;
      color: #6a8a9a;
    }

    /* ── アプリグリッド ── */
    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .app-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
    }
    .app-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.07);
    }
    .app-card.green:hover  { border-color: rgba(46,204,113,0.4); }
    .app-card.blue:hover   { border-color: rgba(0,180,220,0.4); }
    .app-card.orange:hover { border-color: rgba(230,120,30,0.4); }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-name {
      font-size: 1.35rem;
      font-weight: 800;
      color: #ffffff;
    }
    .app-desc {
      font-size: 0.9rem;
      color: #8a9bb0;
      line-height: 1.6;
    }

    .app-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      align-self: flex-start;
    }
    .badge-available {
      background: rgba(46,204,113,0.15);
      color: #2ecc71;
    }
    .badge-coming-soon {
      background: rgba(0,180,220,0.15);
      color: #00b4dc;
    }

    .app-arrow {
      margin-top: auto;
      font-size: 0.85rem;
      color: #4a6a7a;
    }
    .app-card.green  .app-arrow { color: #3a7a5a; }
    .app-card.blue   .app-arrow { color: #3a6a8a; }
    .app-card.orange .app-arrow { color: #7a5a2a; }
    .app-card:hover .app-arrow { color: #aaa; }

    /* ── フッター ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: #3a4a5a;
      font-size: 0.82rem;
    }
  </style>

<body>

<header>
  <h1>negtak</h1>
  <p>かわいいドット絵のシミュレーションゲーム</p>
</header>

<div class="apps">

  <!-- Zoomulator -->
  <a href="./zoomulator/" class="app-card green">
    <div class="app-icon">
      <img src="./zoomulator/AppIcon.png" alt="Zoomulator" width="80" height="80" loading="lazy">
    </div>
    <div>
      <h2 class="app-name">Zoomulator</h2>
      <p class="app-desc">夢の動物園をつくろう。30種以上の動物を集め、区画を飾り、来場者を魅了しよう。</p>
    </div>
    <span class="app-badge badge-available">App Store で配信中</span>
    <span class="app-arrow">詳しく見る →</span>
  </a>

  <!-- Aquamulator -->
  <a href="./aquamulator/" class="app-card blue">
    <div class="app-icon">
      <img src="./aquamulator/AppIcon.png" alt="Aquamulator" width="80" height="80" loading="lazy">
    </div>
    <div>
      <h2 class="app-name">Aquamulator</h2>
      <p class="app-desc">夢の水族館をつくろう。魚や海の生き物を集め、水槽を飾り、来場者を魅了しよう。</p>
    </div>
    <span class="app-badge badge-coming-soon">Coming Soon</span>
    <span class="app-arrow">詳しく見る →</span>
  </a>

</div>

<footer>

</footer>
